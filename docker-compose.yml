version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: expenses-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    restart: unless-stopped

  api:
    build: .
    container_name: expenses-api
    ports:
      - "8081:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=ExpensesDB;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
      Jwt__Key: "MySecretKey12345678901234567890123"
      Jwt__Issuer: "ExpensesSystem"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: expenses-frontend
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped