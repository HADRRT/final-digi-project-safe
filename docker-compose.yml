version: '3.8'

services:
  api:
    build: .
    ports:
      - "8081:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=ExpensesDB;User=sa;Password=Your_password123;TrustServerCertificate=True
      - Jwt__Key=MySecretKey12345678901234567890123
      - Jwt__Issuer=ExpensesSystem
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123
    ports:
      - "1433:1433"

  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - api